<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>租屋需求 AI 分析測試</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 2rem auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        label {
            font-weight: 600;
            color: #cbd5e1;
        }

        textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            color: white;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            resize: vertical;
            min-height: 120px;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            align-self: flex-end;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .button-content {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Results Section */
        #results-container {
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-section {
            margin-bottom: 1.5rem;
        }

        .result-section h3 {
            color: #94a3b8;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.8rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .token-tag {
            background: rgba(51, 65, 85, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #e2e8f0;
        }

        .feature-card {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-left: 4px solid var(--accent-color);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .feature-card:hover {
            border-left-color: #a78bfa;
            transform: translateX(2px);
            transition: all 0.2s ease;
        }

        .feature-key {
            font-weight: 600;
            color: #cbd5e1;
        }

        .feature-val {
            color: #60a5fa;
            font-family: monospace;
            font-size: 1.1rem;
            background: rgba(15, 23, 42, 0.5);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
        }

        .error-message {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: none;
            margin-top: 1rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>租屋需求 AI 分析</h1>
            <p class="subtitle">ONNX NLP 模型即時語意萃取與特徵標籤產生器</p>
        </header>

        <main>
            <!-- Input Area -->
            <div class="glass-panel">
                <div class="input-group">
                    <label for="requirement-input">請輸入一段口語化的租屋需求：</label>
                    <textarea id="requirement-input"
                        placeholder="例如：我是男生，想找南區興大附近預算8000內的套房。必須要有雙人床、冰箱和洗衣機，而且要能養貓。希望租金能包水和網路。"></textarea>

                    <button id="analyze-btn">
                        <div class="button-content">
                            <span>分析語意特徵</span>
                            <div class="loader" id="btn-loader"></div>
                        </div>
                    </button>
                    <div id="error-box" class="error-message"></div>
                </div>
            </div>

            <!-- Results Area -->
            <div id="results-container" class="glass-panel">
                <div class="result-section">
                    <h3>1. 斷詞結果 (Word Segmentation)</h3>
                    <div id="tokens-display" class="tag-container">
                        <!-- Tokens will appear here -->
                    </div>
                </div>

                <div class="result-section" style="margin-top: 2rem;">
                    <h3>2. 結構化萃取特徵 (Structured Features)</h3>
                    <div id="features-display">
                        <!-- Feature cards will appear here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const analyzeBtn = document.getElementById('analyze-btn');
            const inputArea = document.getElementById('requirement-input');
            const resultsContainer = document.getElementById('results-container');
            const tokensDisplay = document.getElementById('tokens-display');
            const featuresDisplay = document.getElementById('features-display');
            const btnLoader = document.getElementById('btn-loader');
            const btnText = analyzeBtn.querySelector('span');
            const errorBox = document.getElementById('error-box');

            analyzeBtn.addEventListener('click', async () => {
                const text = inputArea.value.trim();
                if (!text) {
                    showError("請先輸入您的租屋需求！");
                    inputArea.focus();
                    return;
                }

                // Loading state
                setLoadingState(true);
                hideError();
                resultsContainer.style.display = 'none';

                try {
                    // Call the Flask API
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ text: text })
                    });

                    const data = await response.json();

                    if (!response.ok || !data.success) {
                        throw new Error(data.error || "伺服器發生錯誤");
                    }

                    // Render Results
                    renderResults(data);

                } catch (error) {
                    showError("API 請求失敗: " + error.message);
                } finally {
                    setLoadingState(false);
                }
            });

            function renderResults(data) {
                // 1. Render Tokens
                tokensDisplay.innerHTML = '';
                if (data.segmented_words && data.segmented_words.length > 0) {
                    data.segmented_words.forEach(word => {
                        // ignore empty or pure whitespace words
                        if (word.trim()) {
                            const span = document.createElement('span');
                            span.className = 'token-tag';
                            span.textContent = word;
                            tokensDisplay.appendChild(span);
                        }
                    });
                } else {
                    tokensDisplay.innerHTML = '<span class="token-tag">無斷詞結果</span>';
                }

                // 2. Render Features
                featuresDisplay.innerHTML = '';
                const features = data.features;

                if (Object.keys(features).length === 0) {
                    featuresDisplay.innerHTML = '<p style="color: #94a3b8; font-style: italic;">未能從您的輸入中萃取出結構化特徵。</p>';
                } else {
                    for (const [key, value] of Object.entries(features)) {
                        const card = document.createElement('div');
                        card.className = 'feature-card';

                        // Format value (handles arrays like furniture or simple strings/numbers)
                        let displayValue = value;
                        if (Array.isArray(value)) {
                            displayValue = value.join(', ');
                        }

                        card.innerHTML = `
                            <span class="feature-key">${key}</span>
                            <span class="feature-val">${displayValue}</span>
                        `;
                        featuresDisplay.appendChild(card);
                    }
                }

                // Show the container
                resultsContainer.style.display = 'block';
            }

            function setLoadingState(isLoading) {
                if (isLoading) {
                    analyzeBtn.disabled = true;
                    btnText.textContent = "分析中...";
                    btnLoader.style.display = "block";
                } else {
                    analyzeBtn.disabled = false;
                    btnText.textContent = "分析語意特徵";
                    btnLoader.style.display = "none";
                }
            }

            function showError(msg) {
                errorBox.textContent = msg;
                errorBox.style.display = 'block';
            }

            function hideError() {
                errorBox.style.display = 'none';
            }
        });
    </script>
</body>

</html>
