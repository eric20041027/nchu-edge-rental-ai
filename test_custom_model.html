<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的專屬 ONNX Web 測試</title>
    <!-- 引入 Transformers.js (只用於載入 Tokenizer) -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0"></script>
    <!-- 引入 ONNX Runtime Web -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #2a2a2a;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.5rem;
            color: #AEE0FF;
            margin-bottom: 1rem;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #333;
            color: white;
            margin-bottom: 1rem;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }

        button:hover {
            background: #0056b3;
        }

        .log-box {
            margin-top: 1rem;
            padding: 1rem;
            background: #111;
            border-radius: 6px;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 0.9rem;
            color: #0f0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 自訂 ONNX 模型 Web 嵌入測試</h1>
        <p>這是一個極簡的測試頁面，用來載入您剛才親自訓練並匯出的 `my_custom_model.onnx`！</p>

        <input type="text" id="userInput" value="預算五千套房" placeholder="輸入測試句子...">
        <button id="runBtn" disabled>正在載入模型...</button>

        <div class="log-box" id="outputLog">系統初始化中，請稍候...</div>
    </div>

    <script type="module">
        import { AutoTokenizer, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';

        // 設定：禁止連線至 HuggingFace，強制使用本機權重
        env.allowRemoteModels = false;
        env.localModelPath = window.location.origin + '/';

        let tokenizer = null;
        let session = null;
        const logBox = document.getElementById("outputLog");
        const btn = document.getElementById("runBtn");

        function log(msg) {
            logBox.textContent += "\n" + msg;
            console.log(msg);
        }

        async function init() {
            try {
                log("1. 準備載入 Tokenizer (字典檔)...");
                // 指向我們剛建好的資料夾 custom_onnx_model_dir
                tokenizer = await AutoTokenizer.from_pretrained('custom_onnx_model_dir');
                log("✅ Tokenizer 載入成功！");

                log("2. 準備使用 WebAssembly 載入您的 custom_model.onnx...");
                ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/';

                session = await ort.InferenceSession.create(
                    window.location.origin + '/custom_onnx_model_dir/model.onnx',
                    { executionProviders: ['wasm'] }
                );
                log("✅ 您專屬的 ONNX 模型載入成功！WebAssembly 引擎啟動！");

                btn.textContent = "執行模型推論";
                btn.disabled = false;
            } catch (err) {
                log("❌ 初始化失敗：" + err.message);
                console.error(err);
            }
        }

        btn.addEventListener('click', async () => {
            if (!tokenizer || !session) return;
            const text = document.getElementById("userInput").value;
            logBox.textContent = `--- 測試輸入：[ ${text} ] ---`;

            try {
                // (1) 進行斷詞 (Tokenization)
                log("\n[步驟A] 進行斷詞 (Tokenization)...");
                const tokens = await tokenizer(text, { return_tensor: false });
                log("Token IDs: " + JSON.stringify(tokens.input_ids));

                // (2) 記憶體分配轉型為 ONNX WebAssembly Tensor (BigInt64Array)
                log("\n[步驟B] 分配 64 位元連續記憶體給 WASM...");
                const input_ids = new ort.Tensor('int64', BigInt64Array.from(tokens.input_ids.map(BigInt)), [1, tokens.input_ids.length]);
                const attention_mask = new ort.Tensor('int64', BigInt64Array.from(tokens.attention_mask.map(BigInt)), [1, tokens.attention_mask.length]);
                const token_type_ids = new ort.Tensor('int64', BigInt64Array.from(tokens.token_type_ids.map(BigInt)), [1, tokens.token_type_ids.length]);

                // (3) 送入神經網路推論
                log("\n[步驟C] 神經網路矩陣乘法運算執行中 (Session Run)...");
                const start = performance.now();
                const results = await session.run({
                    'input_ids': input_ids,
                    'attention_mask': attention_mask,
                    'token_type_ids': token_type_ids
                });
                const time = (performance.now() - start).toFixed(2);

                const logits = results.logits.data; // Float32Array
                log(`✅ 推論完成！花費時間：${time} 毫秒`);

                // (4) Argmax 解碼
                log("\n[步驟D] 解碼類別 (Argmax)...");
                let extracted_tags = [];
                for (let i = 0; i < tokens.input_ids.length; i++) {
                    const prob0 = logits[i * 2]; // O / B-Tag (此處簡化對應)
                    const prob1 = logits[i * 2 + 1]; // I-Tag

                    const tag = prob1 > prob0 ? "Tag-1 (內部)" : "Tag-0 (外部)";
                    if (tokens.input_ids[i] !== 101 && tokens.input_ids[i] !== 102) { // 忽略 CLS 與 SEP
                        // 解析原本的字
                        const char = tokenizer.model.vocab ?
                            Object.keys(tokenizer.model.vocab).find(k => tokenizer.model.vocab[k] === tokens.input_ids[i])
                            : "?";
                        extracted_tags.push(`${char}: [${tag}]`);
                    }
                }
                log("\n輸出結果預測：\n" + extracted_tags.join("\n"));
                log("\n(注意：因為我們剛才只用 3 筆資料訓練了 1 秒鐘，所以模型現在是個只會亂猜的笨蛋喔！但重點是架構完全接通了！🚀)");

            } catch (err) {
                log("\n❌ 推論失敗：" + err.message);
                console.error(err);
            }
        });

        // 啟動！
        init();
    </script>
</body>

</html>
